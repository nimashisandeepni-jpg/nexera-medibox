# Nexera Medibox Codemagic Build Configuration Blueprints
workflows:
  default-workflow:
    name: Default Workflow
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    triggering:
      events:
        - push
      branches:
        - main
    scripts:
      - name: Force Clean Corrupted Flutter Kernel Snapshots
        script: |
          # Obliterates stubborn local build caching layers completely
          flutter clean
          flutter pub get
      - name: Flutter Build Development APK
        script: |
          flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk